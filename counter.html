<!doctype html>
<html>
<head>	<title> Input Tag </title>

<style>
input{
	font-size:24px;
	margin:10px;
}
button{
	font-size:24px;
	margin:10px;
	cursor:pointer;
	padding:5px;
}
</style>
</head>
<body>
<div>
<button onclick="decrement()">-</button>	
<input id="quantity" type="number" min=1  value="1" style="width:40px">
<button onclick="increment()">+</button>
</div>
<button onclick="initial()">Reset</button>
<script> 
var res=document.getElementById("quantity").value;
function decrement(){
	if(res>1){
		res--;
		document.getElementById("quantity").value=res;
	}
}

function increment(){
	res++;
	document.getElementById("quantity").value=res;
}
function initial(){
	document.getElementById("quantity").value=1;
}
</script>
</body>
</html>
