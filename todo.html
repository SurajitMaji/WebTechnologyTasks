<!doctype html>
<html>
<head>	<title> TO DO List </title>
<style>
div.container{
	text-align:center;
}
div.input-area{
	margin:10px;
}
input.input-box{
	padding:10px;
	outline:1px solid gray;
	width:400px;
}
input.input-box:focus{
	outline:1px solid orange;
}
button.add-button{
	padding:10px;
	background-color:blue;
	color:white;
}
tr.worklist{
	margin:30px;
	border-bottom:1px solid blue;
}
td.work-text{
	width:400px;	
}
button.delete-button{
	padding:8px;
	background-color:red;
	color:white;
	text-align:right;
	margin:5px;
}
hr{
	width:70%;
	margin:20px;
}
</style>
<head>
<body>
<div class="container">
<center>
	<h1> TODO List</h1>
	<div class="input-area">
		<input type="text" placeholder="Add a new task" class="input-box" id="new_work">
		<button class="add-button" onclick="load_work()">Add</button>
	</div>
	<table class="worklist" id="worklist">
		<tr>
		<td class="work-text" id="work_text"> Complete homework assignment.</td>
			<td><button class="delete-button" id="delete" onclick="delete_task(this)">Delete</button>
		</td>
		</tr>
		<tr>
		<td class="work-text" id="work_text">Buy grocerisce for the week.</td>
			<td><button class="delete-button" id="delete" onclick="delete_task(this)">Delete</button>
		</td>
		</tr>
		
	</table>
</center>
</div>
<script>
function load_work(){
	console.log("Loading New work");
	let task_value=document.getElementById("new_work").value;
	let work_list=document.getElementById("worklist");
	if(task_value==""){
		console.log("Null");
		window.alert("Give some value");
	}
	else{
		worklist.innerHTML+=`
		<tr>
			<td class="work-text" id="work_text">
			`+task_value+`</td>
			<td><button class="delete-button" id="delete" onclick="delete_task(this)">Delete</button></td>
		</tr>
		`;
		document.getElementById("new_work").value="";
	}

}

function delete_task(button){	
		button.parentElement.parentElement.remove();
}
</script>
</body>

</html>
