<!DOCTYPE html>

<html>
 
 <head>
  
 <title>Reverse</title>
    
</head>
 
 <body>
    
  <h1 class="title">Reverse of a number</h1>
  
	<button onclick="fibb()">Print</button>
    <p id="rev_result"></p>
    
  <script>
 
function fibb(){    
  	let n=prompt("Enter the number:");
  
	n=Number(n);    
	let res_ui=document.getElementById("rev_result");
 	let a=0,b=1,c=n;
	while(c!=0){
		b=c%10;
		a=(a*10+b);
		c=Math.floor(c/10);	
	}
   res_ui.innerHTML=a;
}
  </script>

  </body>

</html>
