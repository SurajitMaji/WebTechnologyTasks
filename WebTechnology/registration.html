<html>
<head><title>Photo Upload</title>
<style>
form{
	border:1px solid black;
}
table{
	text-align:center;
}
</style>
</head>
<body>
<form onsubmit="return registered()">
<center>
<h1>Registration</h1>
<table>
<tr>
<td><label>Name: </label></td><td><input type="name" id="name"></td></tr>
<tr>
<td><label>Gender :</label></td><td><input type="radio" name="gender" value="Male" id="gender">Male
<input type="radio" name="gender" value="Female" id="gender">Female
<input type="radio" name="gender" value="Others" id="gender">Others </td>
</tr>
<tr>
<td>Date Of Birth:</td>
<td><input type="date" id="dob"></td>
</tr>

<tr>
<td><label>District : </label></td>
<td>
<select id="dist">
<option>Darjeeling</option>
<option>Birbhum</option>
<option>Bankura</option>
<option>Nodia</option>

</select>
</td>
</tr>

<tr>
<td><label>Choose Photo: </label></td>
<td><input type="file" id="image_file" onchange="show_image(event)">
</td>
</tr>
<tr>
<td>
<img id="show_photo" alt="image preview" height="200px" width="150px">
</td>
<td>
<input type="submit">
</td>
</tr>
</center>
</table>
</form>
<div id="result"></div>

<script>
let image=document.getElementById("image_file");

let previewImage=document.getElementById("show_photo");
let imagePath="";

function show_image(event){
	let photo_file=event.target.files[0];
	console.log(photo_file);
	if(photo_file){
		let reader= new FileReader();
		reader.onload=function(e){
			previewImage.src=e.target.result;
			imagePath=e.target.result;
		console.log("Image loaded:",previewImage.src);
		}
       reader.readAsDataURL(photo_file);
	}	
}
function registered(){

    let name = document.getElementById("name").value;
    let gender = "";
    let gen = document.getElementsByName("gender");

    for(let i=0; i<gen.length; i++){
        if(gen[i].checked){
            gender = gen[i].value;
        }
    }


    let dob = document.getElementById("dob").value;
    let district = document.getElementById("dist").value;

   document.getElementById("result").innerHTML=`

    <h2>Registration Information</h2>

    <p><b>Name :</b> ${name}</p>

    <p><b>Gender :</b> ${gender}</p>

    <p><b>Date of Birth :</b> ${dob}</p>

    <p><b>District :</b> ${district}</p>

    <img src="${imagePath}" height="200px" width="150px">

    `;



    return false; 
}
</script>
</body>

</html>
