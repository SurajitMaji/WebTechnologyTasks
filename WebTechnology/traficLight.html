<!DOCTYPE html>
<html>
  <head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trafic Signal</title>
<style>
div.signal-board{
background-color:black;
margin:30px;
padding:20px;
border-radius:10px;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

div.light{
	background-color:gray;
	padding:75px;
	border-radius:90px;
	border:2px solid white;
	margin:20px;
transition:.3s;
}
div.control-board{
border:2px solid black;
padding:10px;
margin:20px;
}
button{
	padding:20px;
	font-size:30px;
	margin:20px;
}

</style>
</head>
  <body>
<center>
<h1> Trafic Manangement</h1>
<div class="signal-board">
<div class="light" id="red"></div>
<div class="light" id="yellow"></div>
<div class="light" id="green"></div>
</div>

<div class="control-board">
<h2>Control Area</h2>
<div class="buttons">
	<button class="red" onclick="stop()">Stop</button>
	<button class="yellow" onclick="look()">Look</button>
	<button class="green" onclick="go()">Go</button>
</div>
</div>




</center>
<script>
let a=document.getElementById("red");
let b=document.getElementById("yellow");
let c=document.getElementById("green");

function stop(){
	a.style.backgroundColor="red";
	b.style.backgroundColor="gray";
	c.style.backgroundColor="gray";
}
function look(){
	a.style.backgroundColor="gray";
	b.style.backgroundColor="yellow";
	c.style.backgroundColor="gray";
}
function go(){
	a.style.backgroundColor="gray";
	b.style.backgroundColor="gray";
	c.style.backgroundColor="Lime";
}


</script>




</body>
</html>
