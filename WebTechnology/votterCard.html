<!doctype html>
<html>
<head>	<title> Voter Card </title></head>
<body>

<h2> Voter Registration</h2>
<form onsubmit="return form_validation()" method="GET">
<label> Your Full Name: </label>
<input type="text" id="v_name"> <br><br>
<label>Age: </label>
<input type="number" id="v_age" onchange="age_check()"> <br><br>
<label>Country: </label>
<input type="text" id="v_country" onchange="check_citizen()" placeholder="India"> <br><br>
<input type="submit"> 
</form>
<div id="output"></div>

<script> 

function age_check(){
	let age=document.getElementById("v_age").value;
	if(age<18){
		window.alert("The person is under age!!");
	}
}
function check_citizen(){
	let citizen=document.getElementById("v_country").value;
	if(citizen!="India"){
		window.alert("Non Indians are not eligible to get the Voter Id card!!");
	}
}
function form_validation(){
	let name=document.getElementById("v_name").value;	
	let age=document.getElementById("v_age").value;
	let citizen=document.getElementById("v_country").value;
	
	document.getElementById("output").innerHTML=`
	<div>Name : ${name}</div>
	<div>Age : ${age}</div>
	<div> Country : ${citizen}</div>
	`;
	return false;
}
</script>

</body>
</html>
