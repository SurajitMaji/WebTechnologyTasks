<!doctype html>
<html>
<head>
	<title> Form Tag </title>	
<head>
<body>
	<h2> Student Registration Form </h2>
<form>
	<label> Full Name: </label> <input type="text"> <br><br>
	<label> Email : </label> <input type="email"> <br><br>
	<label> Password : </label> <input type="password"> <br><br>
	<label> Mobile Number : </label> <input type="number"> <br><br>
	<label> Date of Birth : </label> <input type="date"> <br><br>
	<label> Gender : </label>
		<input type="radio" name="gender" value="male"> <label>Male</label>
		<input type="radio" name="gender" value="female"> <label>Female</label>
		<input type="radio" name="gender" value="other"> <label>Other</label> <br><br>

	<label> Skills </label>
		<select>
			<option>---Select Course---</option>
			<option>BCA</option>	
			<option>B.Tech</option>	
			<option>M.Tech</option>	
		</select> <br><br>
	<label> Put Photo : </label> <input type="file"> 
	<button>Upload</button> <br><br>
	<label> Remarks:</label> <textarea></textarea> <br><br>
	<input type="submit">
	<input type="reset">
</form>
</body>
</html>
