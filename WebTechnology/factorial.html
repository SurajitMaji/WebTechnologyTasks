<!doctype html>
<html>
<head>	<title> Input Tag </title><head>
<body>
<button onclick="fact()"> Find Factorial </button>
<h1 id="result_tag"></h1>

<script>
function fact(){
let n = prompt("Enter a number:");

function factorial(n) {
    let i, res = 1;

    for (i = 1; i <= n; i++) {
        res *= i;
    }

    return res;
}

let result = factorial(n);

document.write("Factorial = " + result);
document.getElementById("result_tag").innerHTML="Result"+result;

}
</script>
</body>

</html>
