<!doctype html>
<html>
<head>	<title> Calculator </title>
<style>
.section{
	background-color:white;
	text-align:center;
	display:block;
}
h1.result{
text-align:right;
margin-right:50px;
padding-top:70px;
padding-bottom:70px;
}
td.black_box{
background-color:black;
color:white;
		border-radius:10px;padding:10px;
		font-size:34px;
		width:25%;
		text-align:center;
	height:40px;
}
td.gray-box{
background-color:gray;
		border-radius:10px;padding:10px;
		font-size:34px;
		width:25%;
		text-align:center;
	height:40px;
}
</style>
<head>
<body>
<div class="section">
<h1 class="result">0</h1>
<table cellspacing="10px" width="100%">

<tr>
<td class="black_box" >C</td>
<td class="black_box" >%</td>
<td class="black_box">DEL</td>
<td class="black_box">/</td>
</tr>

<tr>
<td class="gray-box" >7</td>
<td class="gray-box" >8</td>
<td class="gray-box">9</td>
<td class="black_box">X</td>
</tr>

<tr>
<td class="gray-box" >4</td>
<td class="gray-box" >5</td>
<td class="gray-box">6</td>
<td class="black_box">-</td>
</tr>
<tr>
<td class="gray-box" >1</td>
<td class="gray-box" >2</td>
<td class="gray-box">3</td>
<td class="black_box">+</td>
</tr>
<tr>
<td class="gray-box" >00</td>
<td class="gray-box" >0</td>
<td class="gray-box">.</td>
<td class="black_box">=</td>
</tr>

</table>


</div>
</body>
</html>
