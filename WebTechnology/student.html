<script>
let user_array=[
["admin","system"],
["amit","malik"],
["bipul","sharma"],
["chotu","1234"]
];
function login(){

let uid=document.getElementById("userid").value;
let pass=document.getElementById("password").value;
let found=false;
let result=document.getElementById("response");

for(let i=0;i<user_array.length;i++)
{
    if(uid==user_array[i][0] && pass==user_array[i][1])
    {
       found=true;
	break;
    }
}

if(found==true){
	result.innerHTML="Successfully Logged In.";
}
else{
	result.innerHTML="Invalid User Id or Password";
}

return false;

}

</script>
