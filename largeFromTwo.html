<!doctype html>
<html>
<head>	<title> Large Number </title><head>
<body>
<div onclick="large()">Start</div>
</body>
<script> 
function large(){
let n=prompt("Enter a number:");
let m=window.prompt("Enter another number:");
let res;
if(n>m){
	res=n;
}
else{
	res=m;
}
window.alert("The largest between "+n+" and "+m+" is :"+res);
}

</script>
</html>
