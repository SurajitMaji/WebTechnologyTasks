<!DOCTYPE html>
<html>
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Technology</title>
	<style>
		.container{
			display:flex;
			flex-direction:column;
			margin:15px;
			padding:15px;
		
		}
	.title{
		display:flex;
		justify-content:center;
		paading:10px;
	}
	#table_of_content{
		display:grid;
		grid-template-columns:.7fr 1fr;
			height:640px;
		
	}
	section.question-area{
		height:100%;
		overflow:scroll;
	}
	.frame-area{
		border:1px solid grey;
		display:flex;
		flex-direction:column;
		align-items:center;
		height:100%;
		width:100%;
	}
	.frame-box{
		width:100%;
	}
	iframe{
		height:550px;
		width:98%;
	}
	.no{
		font-size:30px;
	}
	.question{
		margin:15px 2px;
		font-family:system-ui;
		cursor:pointer;
		padding:5px;
		transition:.5s;
	}
	.question:hover{
		background-color:Azure;
	}
.lv-btn{
	text-decoration:none;
	background-color:blue;
	color:white;
	padding:10px 20px;
	margin-top:20px;
}

@media screen and (max-width:720px){
	#table_of_content{
		display:flex;
		flex-direction:column;
		width:100%;
		height:auto;
	}
}
	</style>
  </head>
  <body>
<div class="container">
      <h1 class="title">Web Technology Assignment</h1>
      <div id="table_of_content">
		<section class="question-area" id="questions"></section>
		<section class="frame-area" id="frame_box">
			<h2> Welcome to Our Tutorial </h2>
		</section>
	</div>

</div>
      <script src="taskList.js"></script>

  </body>
</html>
