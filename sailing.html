<!DOCTYPE html>

<html>
 
 <head>
  
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
 <title>Marquee</title>

<style>
h1{
	text-align:center;
}
.container{
	display:grid;
	grid-template-columns:1fr .3fr;
	margin:10px;
	padding:10px;
}
.sea-area{
background-image:url("./images/151177.gif");
background-repeat:no-repeat;
background-size:cover;
border:2px solid black;
}
marquee{
	margin-top:280px
}
img{
	width:420px;
	height:200px;
}
.controller{
	display:flex;
	flex-direction:column;
	justify-content:center;
	align-items:center;
	
}
.button-area{
	display:flex;
	flex-wrap:wrap;
	justify-content:center;
}
.btn{
	font-size:18px;
	margin:20px;
	padding:15px 28px;
	background-color:DodgerBlue;
	cursor:pointer;
	transition:.4s;
	border:2px solid transparent;
	border-radius:15px;
	color:white;
}
.btn:hover{
	background-color:MediumSeaGreen;
	border-radius:30px;
}

.btn:active{
	background-color:Tomato;
}

@media screen and (max-width: 720px) {
.container{
	display:flex;
	flex-direction:column;
}
}
</style>
 </head>
 

 <body>
 
<h1>Ship Sailor</h1> 
<div class="container">
<div class="sea-area">
	<marquee scrollamount="2" id="ship">
		<img src="./images/jship.png">
	</marquee>
</div>
<div class="controller">
	<div><h2> Ship Controller </h2></div>
	<div class="button-area">
	<button class="btn" id="start" onclick="startShip()">Start</button>
	<button class="btn" id="stop" onclick="stopShip()">Stop</button>
	<button class="btn" id="fast" onclick="fastShip()">Speed Up</button>
	<button class="btn" id="slow" onclick="slowShip()">Speed Down</button>
	</div>
</div>
</div>
  
  
<script>


let ship_control=document.getElementById("ship");
function startShip() {
  
 	ship_control.start();

}



function stopShip(){

  	ship_control.stop();

}


let speed = ship_control.scrollAmount;
// seconds



function fastShip(){
	if(speed>=1){
		speed++;
	ship_control.scrollAmount=speed;
	}
}
function slowShip(){
	if(speed>1){
		speed--;
	ship_control.scrollAmount=speed;
	}
}

</script>

 </body>

</html>
