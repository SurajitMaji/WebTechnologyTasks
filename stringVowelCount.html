<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Initials</title>
</head>
<body>
<center>
    <h1>Count Vowels</h1>

        <input type="text" id="user_input">
        <button onclick="count_vowels()">Count</button>
 
    <p id="input"></p>
    <p id="output"></p>
</center>
<script>
    function count_vowels(){
        let npt=document.getElementById("input");
        let upt=document.getElementById("output");
        let uVal=document.getElementById("user_input").value;       
            npt.innerHTML="Input: "+uVal;           
            let count=0;
            for(let i=0;i<uVal.length;i++){
                if(uVal[i]=='a' || uVal[i]=='A' || 
                    uVal[i]=='e' || uVal[i]=='E' ||
                    uVal[i]=='i' || uVal[i]=='I' ||
                    uVal[i]=='o' || uVal[i]=='O' || 
                    uVal[i]=='u' || uVal[i]=='U'){
                        count++;
                }
            }       
        upt.innerHTML="Output: " + count;
        
    }
</script>
</body>
</html>
