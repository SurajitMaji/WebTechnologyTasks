<!DOCTYPE html>
<html>
  <head>
    <title>DOM Sibling</title>
  <body>

<h1 id="first">HTML</h1>
<h2 id="second">CSS</h2>
<h3 id="third">Javascript</h3>
<script>
let x=document.getElementById("second");
console.log("The Previous Sibling =>",x.previousElementSibling); 
console.log("The Next Sibling =>",x.nextElementSibling);
</script>




</body>
</html>
